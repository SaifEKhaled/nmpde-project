name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container: dealii/dealii:v9.5.1-focal
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: mkdir build && cd build && cmake -DCMAKE_BUILD_TYPE=Release ..
      - name: Build
        run: cd build && make -j$(nproc)
      - name: Smoke test (CN, small mesh)
        run: |
          mkdir -p results
          mpirun --allow-run-as-root --oversubscribe -np 2 build/wave_equation parameters/theta_cn.prm